name: Deploy Carpoolink Services

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "services/**"
      - "packages/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO_OWNER: ${{ github.repository_owner }}

jobs:
  detectChanges:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      changed_services: ${{ steps.force-all.outputs.changes ||steps.changes.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            core-api:
              - 'services/core-api/**'
              - 'packages/**'
            chat-service:
              - 'services/chat-service/**'
              - 'packages/**'
            media-server:
              - 'services/media-server/**'
              - 'packages/**'
            question-service:
              - 'services/question-service/**'
              - 'packages/**'
            question-model-api:
              - 'services/question-service/python_api/**'
              - 'services/question-service/scripts/**'
              - 'services/question-service/requirements.txt'
              - 'services/question-service/Dockerfile.model-api'
              - 'services/model/question_detection.dvc'
            stt-service:
              - 'services/stt-service/**'
              - 'packages/**'
      
      - name: Force all services if manual trigger
        id: force-all
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo 'changes=["core-api", "chat-service", "media-server", "question-model-api", "question-service", "stt-service"]' >> $GITHUB_OUTPUT
  
  buildAndPush:
    name: Build and Push ${{ matrix.service }}
    needs: detectChanges
    runs-on: ubuntu-latest
    if: needs.detectChanges.outputs.changed_services != '[]'
    strategy:
      matrix:
        service: ${{ fromJSON(needs.detectChanges.outputs.changed_services) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      # 1. QEMU 설치 (멀티 아키텍처 빌드용)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=${{ github.sha }}
            type=raw,value=latest

      - name: Resolve Dockerfile
        id: dockerfile
        run: |
          if [ "${{ matrix.service }}" = "question-model-api" ]; then
            echo "path=./services/question-service/Dockerfile.model-api" >> "$GITHUB_OUTPUT"
          else
            echo "path=./services/${{ matrix.service }}/Dockerfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.path }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ matrix.service }}:buildcache,mode=max

  getInstanceId:
    name: Get EC2 Instance ID
    runs-on: ubuntu-latest
    outputs:
      instance_id: ${{ steps.get_instance_id.outputs.instance_id }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Get EC2 Instance ID
        id: get_instance_id
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=carpoolink-server" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to EC2
    needs: [detectChanges, buildAndPush, getInstanceId]
    runs-on: ubuntu-latest
    if: needs.detectChanges.outputs.changed_services != '[]' && needs.getInstanceId.outputs.instance_id != ''
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Read DVC file content
        id: dvc_file
        run: |
          CONTENT=$(cat services/model/question_detection.dvc | base64 -w 0)
          echo "question_detection_dvc=$CONTENT" >> $GITHUB_OUTPUT

      - name: Deploy Services to EC2
        uses: peterkimzz/aws-ssm-send-command@master
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          instance-ids: ${{ needs.getInstanceId.outputs.instance_id }}
          working-directory: /app
          comment: Deploy Carpoolink Services
          command: |
            set -e
            export HOME=/root
            
            # GitHub Container Registry 로그인
            echo "${{ secrets.TK_GITHUB_ACCESS_TOKEN }}" \
              | docker login ghcr.io \
                -u ${{ secrets.TK_GITHUB_ACCESS_TOKEN_OWNER }} \
                --password-stdin
            
            # 환경 변수 설정
            echo "${{ secrets.ENV_FILE_B64 }}" | base64 -d > /app/.env
            
            # 네트워크 생성
            docker network create carpoolink-network 2>/dev/null || true
            
            # 변경된 서비스 목록 가져오기
            CHANGED_SERVICES=$(echo '${{ needs.detectChanges.outputs.changed_services }}' | jq -r '.[]')

            for SERVICE in $CHANGED_SERVICES; do
              echo "Deploying $SERVICE..."

              # 1. 이미지 가져오기
              docker pull ghcr.io/${{ env.REPO_OWNER }}/$SERVICE:${{ github.sha }} || {
                echo "Failed to pull image for $SERVICE. Skipping deployment for this service."
                continue
              }

              # 2. 기존 컨테이너 정리
              docker stop carpoolink-$SERVICE 2>/dev/null || true
              docker rm carpoolink-$SERVICE 2>/dev/null || true

              # 3. 새 컨테이너 배포
              case $SERVICE in
                "core-api")
                  docker run --rm \
                    --name carpoolink-db-sync \
                    --network carpoolink-network \
                    --env-file /app/.env \
                    ghcr.io/${{ env.REPO_OWNER }}/core-api:${{ github.sha }} \
                    sh -lc 'npx prisma db push --schema=/app/packages/database/prisma/schema.prisma --skip-generate --accept-data-loss && npx prisma db seed --schema=/app/packages/database/prisma/schema.prisma' && \
                  docker run --restart always \
                    -d --name carpoolink-core-api \
                    -p 4000:4000 \
                    --network carpoolink-network \
                    --env-file /app/.env \
                    ghcr.io/${{ env.REPO_OWNER }}/core-api:${{ github.sha }}
                  ;;
                "chat-service")
                  docker run --restart always \
                    -d --name carpoolink-chat-service \
                    -p 4001:4001 \
                    --network carpoolink-network \
                    --env-file /app/.env \
                    ghcr.io/${{ env.REPO_OWNER }}/chat-service:${{ github.sha }}
                  ;;
                "media-server")
                  docker run --restart always \
                    -d --name carpoolink-media-server \
                    --network host \
                    --add-host=${{ secrets.SERVER_URL }}:127.0.0.1 \
                    --add-host=www.${{ secrets.SERVER_URL }}:127.0.0.1 \
                    --env-file /app/.env \
                    ghcr.io/${{ env.REPO_OWNER }}/media-server:${{ github.sha }}
                  ;;
                "question-service")
                  docker run --restart always \
                    -d --name carpoolink-question-service \
                    -p 4003:4003 \
                    --network carpoolink-network \
                    --env-file /app/.env \
                    -e QUESTION_MODEL_API_URL=http://carpoolink-question-model-api:8000 \
                    ghcr.io/${{ env.REPO_OWNER }}/question-service:${{ github.sha }}
                  ;;
                "question-model-api")
                  # DVC 설치 (없으면)
                  command -v dvc >/dev/null 2>&1 || pip3 install "dvc[s3]" -q

                  # DVC 초기화 및 remote 설정 (없으면)
                  if [ ! -f /app/.dvc/config ]; then
                    cd /app && dvc init --no-scm
                    dvc remote add -d carpoolink s3://capstone2026-carpoolink-dvc-kro
                    dvc remote modify carpoolink region ap-northeast-2
                  fi

                  # .dvc 파일 업데이트 (GitHub repo 기준)
                  mkdir -p /app/services/model
                  echo "${{ steps.dvc_file.outputs.question_detection_dvc }}" | base64 -d > /app/services/model/question_detection.dvc

                  # S3에서 모델 동기화 (변경된 것만 다운로드)
                  cd /app && dvc pull services/model/question_detection.dvc

                  docker run --restart always \
                    -d --name carpoolink-question-model-api \
                    --network carpoolink-network \
                    --env-file /app/.env \
                    -e QUESTION_PRELOAD_KC_ELECTRA=true \
                    -e QUESTION_TFIDF_ARTIFACT_DIR=/app/services/model/question_detection/tfidf_lr_v2 \
                    -e QUESTION_KC_ELECTRA_DIR=/app/services/model/question_detection/kc_electra_v2 \
                    -v /app/services/model/question_detection:/app/services/model/question_detection:ro \
                    ghcr.io/${{ env.REPO_OWNER }}/question-model-api:${{ github.sha }}
                  ;;
                "stt-service")
                  docker run --restart always \
                    -d --name carpoolink-stt-service \
                    -p 4004:4004 \
                    --network carpoolink-network \
                    --add-host=host.docker.internal:host-gateway \
                    --env-file /app/.env \
                    ghcr.io/${{ env.REPO_OWNER }}/stt-service:${{ github.sha }}
                  ;;
                *)
                  echo "Unknown service: $SERVICE. Skipping deployment for this service."
                  ;;
              esac
            done

            if [ ! "$(docker ps -q -f name=carpoolink-reverse-proxy)" ]; then
              docker stop carpoolink-reverse-proxy 2>/dev/null || true
              docker rm carpoolink-reverse-proxy 2>/dev/null || true
              docker run --restart always \
                -d --name carpoolink-reverse-proxy \
                -p 80:80 \
                -p 443:443 \
                --network carpoolink-network \
                --add-host host.docker.internal:host-gateway \
                -v /app/infra/reverse-proxy/default.conf:/etc/nginx/conf.d/default.conf:ro \
                -v /etc/letsencrypt:/etc/letsencrypt:ro \
                nginx:1.27-alpine
            fi
            
            # 미사용 이미지 정리
            docker image prune -af --filter "until=24h" || true
            
            # 배포 완료 메시지
            echo "Carpoolink Services deployed successfully!"
            docker ps --filter "network=carpoolink-network" --format "table {{.Names}}\t{{.Ports}}\t{{.Status}}"
