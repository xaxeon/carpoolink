# infra/compose/docker-compose.yml

services:
  # 데이터베이스
  postgres:
    image: postgres:16-alpine
    container_name: carpoolink-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-carpoolink}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-carpoolink}
      TZ: Asia/Seoul
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-carpoolink}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carpoolink-network

  # Media Server (Port 4002)
  media-server:
    build:
      context: ../..
      dockerfile: services/media-server/Dockerfile
    container_name: carpoolink-media-server
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      MEDIA_SERVER_PORT: 4002
      DATABASE_URL: postgresql://${DB_USERNAME:-carpoolink}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-carpoolink}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      TZ: Asia/Seoul
    ports:
      - "4002:4002"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../services/media-server:/app/services/media-server
      - /app/services/media-server/node_modules
    networks:
      - carpoolink-network
    command: npm run dev

  # 로컬 리버스 프록시 게이트웨이
  local-nginx:
    image: nginx:1.25-alpine
    container_name: carpoolink-local-nginx
    ports:
      - "80:80" # 로컬 PC의 80포트로 접속을 통일합니다.
    volumes:
      - ../reverse-proxy/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - carpoolink-network

networks:
  carpoolink-network:
    driver: bridge

volumes:
  postgres_data: