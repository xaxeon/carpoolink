# infra/reverse-proxy/nginx.local.conf

server {
  listen 80;
  server_name localhost;

  client_max_body_size 50m;

  location = / {
    add_header Content-Type text/plain;
    return 200 'Carpoolink Local Reverse Proxy (Hybrid Mode) is running';
  }

  # Core API (Port 4000)
  location /api/ {
    proxy_pass http://host.docker.internal:4000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Chat Service - WebSockets (Port 4001)
  location /chat/socket.io {
    proxy_pass http://host.docker.internal:4001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
  }

  # Chat Service - HTTP (Port 4001)
  location /chat/ {
    proxy_pass http://host.docker.internal:4001/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Media Server - WebSockets (Port 4002)
  location /media/socket.io {
    proxy_pass http://host.docker.internal:4002;  
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
  }

  # Media Server - HTTP (Port 4002)
  location /media/ {
    proxy_pass http://host.docker.internal:4002/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Question Service (Port 4003)
  location /question/ {
    proxy_pass http://host.docker.internal:4003/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # STT Service (Port 4004)
  location /stt/ {
    proxy_pass http://host.docker.internal:4004/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}