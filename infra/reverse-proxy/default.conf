server {
  listen 80;
  server_name carpoolink.duckdns.org www.carpoolink.duckdns.org;

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  server_name carpoolink.duckdns.org www.carpoolink.duckdns.org;

  ssl_certificate /etc/letsencrypt/live/carpoolink.duckdns.org/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/carpoolink.duckdns.org/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  client_max_body_size 50m;

  location = / {
    add_header Content-Type text/plain;
    return 200 'Carpoolink reverse proxy is running';
  }

  location = /health {
    add_header Content-Type application/json;
    return 200 '{"ok":true,"service":"carpoolink-gateway"}';
  }

  location /api/ {
    proxy_pass http://carpoolink-core-api:4000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /media/socket.io {
    proxy_pass http://host.docker.internal:4002;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
  }

  location /media/ {
    proxy_pass http://host.docker.internal:4002/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /chat/socket.io {
    proxy_pass http://carpoolink-chat-service:4001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
  }

  location /chat/ {
    proxy_pass http://carpoolink-chat-service:4001/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /question/ {
    proxy_pass http://carpoolink-question-service:4003/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /stt/ {
    proxy_pass http://carpoolink-stt-service:4004/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}